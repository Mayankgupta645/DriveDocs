<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All documents</title>
    <link rel="stylesheet" href="drivedocs.css">
</head>
<body>
    <div class="nav">
        <h1>DriveDocs</h1>
        <div class="nav-actions">
            <h3><a href="./dashboard.html">Dashboard</a></h3>
            <h3><a href="./uploaddocument.html">Upload Document</a></h3>
        </div>
    </div>
    <div class="page-header">
        <h2>All Stored Documents</h2>
        <p>Documents uploaded through the platform appear here. Click View to open files or remove outdated entries.</p>
    </div>
    <div id="storage-list" class="storage-list"></div>

    <script>
        const STORAGE_KEY = 'driveDocsDocuments';
        const storageList = document.getElementById('storage-list');

        function getStoredDocuments() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }

        function saveStoredDocuments(documents) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(documents));
        }

        function formatDate(isoString) {
            return new Date(isoString).toLocaleString([], { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function renderDocuments() {
            const documents = getStoredDocuments();

            if (!documents.length) {
                storageList.innerHTML = '<div class="empty-state"><p>No documents have been uploaded yet.</p><a class="button-link" href="./uploaddocument.html">Upload your first document</a></div>';
                return;
            }

            const grouped = documents.reduce((acc, doc) => {
                const key = doc.vehicleNumber.toUpperCase().trim();
                if (!acc[key]) acc[key] = [];
                acc[key].push(doc);
                return acc;
            }, {});

            storageList.innerHTML = Object.entries(grouped).map(([vehicleNumber, docs]) => {
                return `
                    <div class="storage-card">
                        <div class="storage-meta">
                            <h3>Vehicle ${vehicleNumber}</h3>
                            <p><strong>Documents:</strong> ${docs.length}</p>
                            <p><strong>Latest upload:</strong> ${formatDate(docs[0].uploadedAt)}</p>
                            <div class="storage-docs">
                                ${docs.map(doc => {
                                    const viewButton = doc.fileStored ? `<a class="btn btn-primary" href="${doc.fileDataUrl}" target="_blank" rel="noopener">View</a>` : '<span class="badge">Large file stored offscreen</span>';
                                    return `
                                        <div class="storage-doc">
                                            <div>
                                                <p class="doc-title">${doc.fileName}</p>
                                                <p><strong>Type:</strong> ${doc.documentType.replace(/_/g, ' ')}</p>
                                                <p><strong>Expiry:</strong> ${doc.expiryDate}</p>
                                                <p><strong>Uploaded:</strong> ${formatDate(doc.uploadedAt)}</p>
                                            </div>
                                            <div class="doc-actions">
                                                ${viewButton}
                                                <button class="btn btn-secondary" data-id="${doc.id}">Delete</button>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            storageList.querySelectorAll('.btn-secondary').forEach(button => {
                button.addEventListener('click', () => {
                    const id = button.getAttribute('data-id');
                    const documents = getStoredDocuments().filter(doc => doc.id !== id);
                    saveStoredDocuments(documents);
                    renderDocuments();
                });
            });
        }

        renderDocuments();
    </script>
</body>
</html>
