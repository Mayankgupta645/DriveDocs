<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveDocs Login</title>
    <link rel="stylesheet" href="drivedocs.css">
</head>
<body>
    <div class="nav">
        <h1>DriveDocs</h1>
        <div class="nav-actions">
            <h3><a href="./index.html">Home</a></h3>
            <h3><a href="./register.html">Register</a></h3>
        </div>
    </div>
    <div class="page-header">
        <h2>Welcome back</h2>
        <p>Sign in to view your fleet documents, upload new records, and stay on top of renewals.</p>
    </div>
    <div class="auth-container">
        <form class="auth-form" id="loginForm">
            <label for="Email">Email</label>
            <input type="email" id="Email" name="Email" required placeholder="Enter your email">

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter your password">

            <button class="primary-btn" type="submit">Login</button>
            <p class="small-text">Don't have an account? <a href="./register.html">Register here</a></p>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const Email = document.getElementById('Email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('https://drivedocs-backend.onrender.com/api/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ Email, password })
                });

                const data = await res.json();
                if (res.ok) {
                    // Store authentication token
                    localStorage.setItem('authToken', data.token || 'authenticated');
                    localStorage.setItem('userEmail', Email);
                    window.location.href = './dashboard.html';
                } else {
                    alert('Login failed: ' + data.message);
                }
            } catch (err) {
                alert('Connection error: ' + err.message);
            }
        });
    </script>
</body>
</html>
