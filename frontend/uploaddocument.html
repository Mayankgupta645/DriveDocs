<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Document</title>
    <link rel="stylesheet" href="drivedocs.css">
</head>
<body>
    <div class="nav">
        <h1>DriveDocs</h1>
        <div class="nav-actions">
            <h3><a href="./dashboard.html">Dashboard</a></h3>
            <h3><a href="./storage.html">All Documents</a></h3>
        </div>
    </div>
    <div class="page-header">
        <h2>Upload Vehicle Document</h2>
        <p>Keep your fleet compliant by uploading and managing your vehicle documents in one secure place.</p>
    </div>
    <div class="upload-form">
        <form id="document-upload-form" enctype="multipart/form-data">
            <label for="vehicle-number">Vehicle Number:</label>
            <input type="text" id="vehicle-number" name="vehicle_number" required>

            <label for="document-type">Document Type:</label>
            <select id="document-type" name="document_type" required>
                <option value="">Select Document Type</option>
                <option value="rc">Registration Certificate (RC)</option>
                <option value="insurance">Insurance</option>
                <option value="puc">Pollution Under Control (PUC)</option>
                <option value="permit">Permit</option>
                <option value="driver_license">Driver License</option>
            </select>

            <label for="expiry-date">Expiry Date:</label>
            <input type="date" id="expiry-date" name="expiry_date" required>

            <label for="document-file">Upload Document:</label>
            <input type="file" id="document-file" name="document_file" accept=".pdf,.jpg,.jpeg,.png" required>

            <button type="submit">Upload Document</button>
        </form>
    </div>

    <script>
        const STORAGE_KEY = 'driveDocsDocuments';
        const form = document.getElementById('document-upload-form');

        function getStoredDocuments() {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        }

        function saveStoredDocuments(documents) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(documents));
        }

        function readFileAsDataURL(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(reader.error);
                reader.readAsDataURL(file);
            });
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const vehicleNumber = document.getElementById('vehicle-number').value.trim();
            const documentType = document.getElementById('document-type').value;
            const expiryDate = document.getElementById('expiry-date').value;
            const fileInput = document.getElementById('document-file');
            const file = fileInput.files[0];

            if (!vehicleNumber || !documentType || !expiryDate || !file) {
                alert('Please fill in all fields and choose a document file.');
                return;
            }

            const documentRecord = {
                id: Date.now().toString(36) + Math.random().toString(36).slice(2),
                vehicleNumber,
                documentType,
                expiryDate,
                fileName: file.name,
                fileType: file.type || 'application/octet-stream',
                fileSize: file.size,
                uploadedAt: new Date().toISOString(),
                fileDataUrl: file.size <= 512000 ? await readFileAsDataURL(file) : null,
                fileStored: file.size <= 512000
            };

            const documents = getStoredDocuments();
            documents.unshift(documentRecord);
            saveStoredDocuments(documents);

            window.location.href = './storage.html';
        });
    </script>
</body>
</html>
