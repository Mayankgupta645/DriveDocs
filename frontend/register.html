<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveDocs Register</title>
    <link rel="stylesheet" href="drivedocs.css">
</head>
<body>
    <div class="nav">
        <h1>DriveDocs</h1>
        <div class="nav-actions">
            <h3><a href="./home.html">Home</a></h3>
            <h3><a href="./login.html">Login</a></h3>
        </div>
    </div>
    <div class="page-header">
        <h2>Create your account</h2>
        <p>Register to start uploading documents for your fleet and keep every expiry date in one place.</p>
    </div>
    <div class="auth-container">
        <form class="auth-form" id="registerForm">
            <label for="username">Username</label>
            <input type="text" id="username" name="Username" required placeholder="Enter your username">

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter your password">

            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm your password">

            <label for="phone_number">Phone Number</label>
            <input type="text" id="phone_number" name="PhoneNumber" required placeholder="Enter your phone number">

            <label for="email">Email</label>
            <input type="email" id="email" name="Email" required placeholder="Enter your email address">

            <button class="primary-btn" type="submit">Register</button>
            <p class="small-text">Already have an account? <a href="./login.html">Login here</a></p>
        </form>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Get form values
            const Username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            const PhoneNumber = document.getElementById('phone_number').value;
            const Email = document.getElementById('email').value;

            // Check if passwords match
            if (password !== confirm_password) {
                alert('Passwords do not match!');
                return;
            }

            try {
                // Send data to backend
                const response = await fetch('http://localhost:5000/api/user/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        Username,
                        password,
                        PhoneNumber,
                        Email
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    
                    window.location.href = './login.html';
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (error) {
                alert('Connection error: ' + error.message);
            }
        });
    </script>
</body>
</html>
